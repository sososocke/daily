<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Daily
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Daily</ion-title>
    </ion-toolbar>
  </ion-header>

  <div>
    <h1>Date</h1>
    <ion-datetime calss="datetime" presentation="date"></ion-datetime>
    <h1>How was your day?</h1>
    <ul id="emotions-list" style="list-style: none;">
      <li>Energy
        <ion-range aria-label="Range with ticks" [ticks]="true" [snaps]="true" [min]="0" [max]="10" [pin]="true"></ion-range>
      </li>
      <li>Happiness
        <ion-range aria-label="Range with ticks" [ticks]="true" [snaps]="true" [min]="0" [max]="10" [pin]="true"></ion-range>
      </li>
      <li>Stress
        <ion-range aria-label="Range with ticks" [ticks]="true" [snaps]="true" [min]="0" [max]="10" [pin]="true"></ion-range>
      </li>
    </ul>
    <h1>Any events?</h1>
  </div>
</ion-content>
